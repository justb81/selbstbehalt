#
# Standalone nginx reverse proxy for selbstbehalt: HTTPS + HTTP Basic Auth in
# front of the app's own frontend container. See README.md for setup.
#
# Replace `pkv.example.com` below with your real hostname (or a LAN name for
# Option B, e.g. pkv.local) before use.

server {
    listen 80;
    listen [::]:80;
    server_name pkv.example.com;

    # Let's Encrypt HTTP-01 challenge (Option A only, see README). Must stay
    # reachable over plain HTTP even though everything else redirects below.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pkv.example.com;

    # Option A (Let's Encrypt) — see README "Option A":
    ssl_certificate     /etc/letsencrypt/live/pkv.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pkv.example.com/privkey.pem;
    # Option B (self-signed LAN) — see README "Option B": comment the two
    # lines above and uncomment these instead.
    # ssl_certificate     /etc/nginx/certs/selbstbehalt.crt;
    # ssl_certificate_key /etc/nginx/certs/selbstbehalt.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # selbstbehalt handles Art. 9 DSGVO health data — gate the whole app
    # (docs/design.md §7.2). The frontend's own nginx proxies /api to the
    # backend over the Compose network, so this also covers the API.
    auth_basic           "selbstbehalt";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # /api/import/db accepts uploads up to 256 MiB (apps/backend/src/routes/backup.ts).
    client_max_body_size 260m;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
