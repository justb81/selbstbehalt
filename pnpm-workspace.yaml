packages:
  - 'apps/*'
  # Shared code (Zod schemas & types) lives here, e.g. packages/shared.
  - 'packages/*'

allowBuilds:
  esbuild: true
  better-sqlite3: true
  # The browser PWA uses onnxruntime-web only; onnxruntime-node is pulled in as an
  # (unused) peer of ppu-paddle-ocr — never build its native binary, and skip
  # protobufjs' optional install script. Neither runs in the browser.
  onnxruntime-node: false
  protobufjs: false
  # Note: @napi-rs/canvas (pulled in via ppu-paddle-ocr → ppu-ocv) needs NO entry
  # here. It has no install/postinstall lifecycle script — only a manual `build`
  # script that pnpm never runs on install — and ships prebuilt platform binaries
  # as optional deps. It is also never loaded on the web OCR path (we use
  # onnxruntime-web + the `canvas-native` engine), so an allowBuilds entry would
  # be inert.

# Supply-chain cooldown: a newly published version may only be resolved once it
# is at least 7 days old (value is in minutes: 7 × 24 × 60 = 10080). This mirrors
# the Dependabot `cooldown` setting so manual `pnpm add`/`pnpm update` are held to
# the same rule. Frozen-lockfile installs (CI) are unaffected.
minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - eslint-plugin-svelte@3.20.0
  - eslint@10.6.0
  - pdfjs-dist@6.1.200
  - prettier@3.9.0

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
