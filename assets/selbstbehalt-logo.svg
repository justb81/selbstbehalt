<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M50 8 L82 22 L82 52 C82 68 66 82 50 90 C34 82 18 68 18 52 L18 22 Z"
        fill="url(#shieldGrad)" />

  <!-- Inner shield highlight -->
  <path d="M50 15 L76 27 L76 52 C76 65 62 77 50 84 C38 77 24 65 24 52 L24 27 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />

  <!-- Cross (medical) -->
  <rect x="44" y="30" width="12" height="34" rx="3" fill="white" opacity="0.95"/>
  <rect x="33" y="41" width="34" height="12" rx="3" fill="white" opacity="0.95"/>

  <!-- Small lock icon bottom-right of shield -->
  <rect x="58" y="60" width="14" height="11" rx="2.5" fill="#0ea5e9" />
  <path d="M62 60 L62 56 C62 53 70 53 70 56 L70 60"
        fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="65" cy="65" r="2" fill="white" opacity="0.9"/>
  <rect x="64" y="65" width="2" height="3" rx="1" fill="white" opacity="0.9"/>
</svg>