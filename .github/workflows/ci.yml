# SPDX-License-Identifier: Apache-2.0
name: CI

# Docs-, asset- and licence-only changes can't affect lint/typecheck/test/build,
# so skip the (expensive) pipeline for them. Any code, config, data or lockfile
# change still triggers it.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Git hooks are pointless in CI and `prepare` would try to install them.
  HUSKY: '0'

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Active Node LTS line(s). Extend the matrix as new LTS versions land.
        node-version: ['24']
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Fee-schedule tables (reproducible + valid)
        run: |
          pnpm fees:build
          git diff --exit-code -- frontend/src/lib/data/ \
            || (echo '::error::Generated fee-schedule tables are stale — run `pnpm fees:build` and commit the result.' && exit 1)
          pnpm fees:validate

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: '**/coverage/'
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (Chromium)
        run: pnpm --filter @selbstbehalt/frontend exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
