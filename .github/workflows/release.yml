# SPDX-License-Identifier: Apache-2.0
name: Release

# Triggered by the `vX.Y.Z` tag that release-please.yml pushes when a release
# PR is merged. Builds multi-arch (amd64/arm64) images for both services,
# pushes them to GHCR, signs them (cosign, keyless), generates a CycloneDX SBOM
# per image, and attaches the SBOMs plus a ready-to-use Compose file to the
# GitHub Release that release-please already created for this tag.
#
# `workflow_dispatch` allows a dry run on any branch: images are built for the
# host architecture only and are never pushed, signed, or attached to a
# release, so it is safe to run against a feature branch to sanity-check both
# Dockerfiles before cutting a real tag. See docs/release.md.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  PUSH: ${{ github.event_name == 'push' }}

jobs:
  images:
    name: Build & push ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: apps/backend/Dockerfile
          - image: frontend
            dockerfile: apps/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/selbstbehalt-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ env.PUSH == 'true' }}
            type=sha,format=long,enable=${{ env.PUSH != 'true' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Dry runs only build for the runner's native arch — multi-arch
          # builds can't load into the local daemon and aren't needed just to
          # sanity-check that both Dockerfiles still build.
          platforms: ${{ env.PUSH == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ env.PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ env.PUSH == 'true' }}
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Install cosign
        if: env.PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, GitHub OIDC)
        if: env.PUSH == 'true'
        run: |
          cosign sign --yes \
            "${IMAGE_NAMESPACE}/selbstbehalt-${{ matrix.image }}@${{ steps.build.outputs.digest }}"

      - name: Generate CycloneDX SBOM
        if: env.PUSH == 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAMESPACE }}/selbstbehalt-${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image }}.cdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        if: env.PUSH == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.cdx.json
          retention-days: 30
          if-no-files-found: error

  release-assets:
    name: Attach SBOM + Compose example to the GitHub Release
    if: github.event_name == 'push'
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v6
        with:
          pattern: sbom-*
          merge-multiple: true

      - name: Upload assets to the ${{ github.ref_name }} release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            sbom-backend.cdx.json \
            sbom-frontend.cdx.json \
            docker-compose.release.yml \
            --repo "${{ github.repository }}" \
            --clobber
