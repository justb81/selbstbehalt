# SPDX-License-Identifier: Apache-2.0
name: release-please

# Maintains a standing "release PR" that accumulates the changelog and version
# bump for all Conventional Commits landed on `main` since the last release.
# Merging that PR is the only trigger for a release: release-please then tags
# the merge commit `vX.Y.Z` and publishes a GitHub Release with the notes.
# The tag push is what release.yml (image build + GHCR push + release assets)
# listens for. When a release is created, this workflow also calls
# deploy-goae-waechter.yml to publish the GOÄ-Wächter demo to GitHub Pages —
# done here, in the push-to-`main` context, rather than off a `release:
# published` trigger, whose tag ref context the github-pages environment's
# branch-protection rule rejects.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
    steps:
      # A PR (or commit) authored with the default GITHUB_TOKEN does not
      # trigger other workflows (a GitHub Actions anti-recursion rule), so
      # CI would never run on the release PR. Falls back to GITHUB_TOKEN if
      # the optional RELEASE_PLEASE_TOKEN repo secret (a PAT/GitHub App
      # token) isn't configured — the release PR still opens either way,
      # just without CI status checks. See docs/release.md.
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please generates/updates CHANGELOG.md and bumps package.json
      # versions without running Prettier, so the release PR fails the
      # `format:check` CI gate. Format the generated files and push a fixup
      # commit onto the release PR branch so it stays green.
      - uses: actions/checkout@v7
        if: steps.release-please.outputs.pr
        with:
          ref: ${{ fromJSON(steps.release-please.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        if: steps.release-please.outputs.pr
        uses: pnpm/action-setup@v6

      - name: Set up Node
        if: steps.release-please.outputs.pr
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Format release PR
        if: steps.release-please.outputs.pr
        run: |
          pnpm install --frozen-lockfile
          pnpm format
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: format release-please output"
            git push
          fi

  # A release was just cut (the release-please PR was merged) ⇒ publish the
  # standalone GOÄ-Wächter demo to GitHub Pages. Runs in this workflow's
  # push-to-`main` context, so github.ref is refs/heads/main and the
  # github-pages environment's default branch-protection rule accepts the
  # deployment; a `release: published` trigger would run in the tag context and
  # be rejected. Builds `main`'s HEAD, which is the just-tagged release commit.
  deploy-goae-waechter:
    name: Deploy GOÄ-Wächter demo (GitHub Pages)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-goae-waechter.yml
