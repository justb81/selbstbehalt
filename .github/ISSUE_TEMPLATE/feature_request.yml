# SPDX-License-Identifier: Apache-2.0
name: Feature request
description: Suggest a new feature or an improvement.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, if any.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      description: >
        selbstbehalt is privacy-first (see §8 of docs/design.md). Please confirm
        your idea is compatible with these constraints.
      options:
        - label: This does not require sending invoice images or raw OCR text off the device
          required: false
        - label: This does not require server-side AI/LLM or a third-party runtime dependency
          required: false
