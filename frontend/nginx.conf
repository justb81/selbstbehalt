# SPDX-License-Identifier: Apache-2.0
#
# nginx config for serving the static SvelteKit PWA bundle (adapter-static).
# Written so the server runs fully unprivileged: the pid file and all temp
# paths live under /tmp, and it listens on :3000 (see frontend/Dockerfile).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Temp paths under /tmp so a non-root worker can write them.
  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  access_log /dev/stdout;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

  server {
    # IPv4 only: many self-hosting targets (Proxmox LXC, some NAS) disable IPv6,
    # where an explicit `listen [::]:3000` would hard-fail at startup.
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets are safe to cache indefinitely.
    location /_app/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback: unknown routes are served the app shell so client-side
    # routing can take over (adapter-static is configured with fallback).
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
