# SPDX-License-Identifier: Apache-2.0
#
# nginx config for serving the static SvelteKit PWA bundle (adapter-static).
# Written so the server runs fully unprivileged: the pid file and all temp
# paths live under /tmp, and it listens on :3000 (see frontend/Dockerfile).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Temp paths under /tmp so a non-root worker can write them.
  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  access_log /dev/stdout;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

  # Docker's embedded DNS (user-defined Compose network). Used so the backend
  # upstream below is resolved per request rather than pinned at startup, which
  # would 502 after a backend container restart hands it a new IP.
  resolver 127.0.0.11 ipv6=off valid=30s;

  server {
    # IPv4 only: many self-hosting targets (Proxmox LXC, some NAS) disable IPv6,
    # where an explicit `listen [::]:3000` would hard-fail at startup.
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST API: proxy to the backend service so the browser only ever talks to
    # this single origin. Same-origin means the reverse-proxy HTTP Basic Auth
    # that protects the app also covers the API (no separate login, no
    # cross-origin credential dance) and there is no CORS at all — see
    # docs/design.md §7.2. The backend is reached over the Compose network as
    # `backend:8080`. A variable upstream (plus the `resolver` above) defers DNS
    # to request time; `$request_uri` keeps the full `/api/...?...` path intact.
    location /api/ {
      set $backend_upstream http://backend:8080;
      proxy_pass $backend_upstream$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Content-hashed build assets are safe to cache indefinitely.
    location /_app/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback: unknown routes are served the app shell so client-side
    # routing can take over (adapter-static is configured with fallback).
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
