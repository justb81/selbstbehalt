<html lang="de-DE">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Private Krankenversicherung selbst verwalten" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <!-- PWA installability (docs/design.md §6.3, issue #27). The manifest is
         generated by @vite-pwa/sveltekit at a stable filename; linking it here
         (rather than relying on plugin head-injection) keeps it in the static
         SPA fallback that adapter-static emits.
         `crossorigin="use-credentials"` is required behind a reverse-proxy HTTP
         Basic Auth (the §7.2 default deployment): per the Web App Manifest spec
         the browser fetches the manifest — and the icons it references — with
         credentials *omitted* unless this is set, so the proxy answers 401 with
         its login HTML, the manifest never parses, and the app is not
         installable. With it, stored Basic Auth is sent and the same-origin
         manifest loads. -->
    <link
      rel="manifest"
      href="%sveltekit.assets%/manifest.webmanifest"
      crossorigin="use-credentials"
    />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
