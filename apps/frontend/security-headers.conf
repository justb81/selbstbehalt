#
# Shared security headers (issue #31, docs/design.md §7.2/§8). `include`d in
# every `location` block of nginx.conf — nginx does NOT inherit `add_header`
# from an outer context into a location that declares its own `add_header`
# (e.g. `/_app/`'s Cache-Control), so defining these once at the `server`
# level would silently drop them there. Including this file everywhere avoids
# that pitfall.
#
# CSP directive rationale (kept in sync with what the app actually loads —
# update this comment if a new resource type is introduced):
#   - script-src 'wasm-unsafe-eval': onnxruntime-web (OCR, issue #24) compiles
#     WebAssembly modules; this permits WASM compilation without the much
#     broader 'unsafe-eval' (no JS eval/new Function is used anywhere).
#   - script-src 'sha256-...': SvelteKit's own inline client-init `<script>`
#     (sets the `__sveltekit_<hash>` globals before the app boots). Its exact
#     content — and thus this hash — only changes if `kit.version.name` in
#     svelte.config.js changes (pinned there precisely so it doesn't drift
#     across ordinary rebuilds) or the SvelteKit version changes the template;
#     apps/frontend/e2e/csp.spec.ts hashes the real built `build/index.html`
#     and fails the build if it no longer matches this value.
#   - style-src 'unsafe-inline': a few shadcn-svelte primitives set inline
#     `style` attributes with per-render dynamic values (e.g. the progress bar
#     transform, sonner's CSS custom properties) — these can't be expressed as
#     a static hash or covered by a nonce on a prebuilt static SPA. Inline
#     *styles* are a materially smaller XSS surface than inline *scripts*
#     (which stay strictly 'self').
#   - worker-src 'self': the OCR worker (ocr.worker.ts) and the pdf.js worker
#     are both same-origin, content-hashed module workers built by Vite — no
#     blob: worker is used.
#   - img-src includes data:/blob: for canvas-rendered previews of scanned
#     invoices; connect-src/manifest-src stay 'self' since the OCR models and
#     ONNX Runtime WASM are served from this origin (§1.3/§8 — never a CDN).
#   - frame-ancestors/object-src/base-uri are locked down; the app never
#     embeds or is embedded, and has no legacy plugin content.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'sha256-qE8d/S9kexzxxb5iLJ8JQCQlvlbZFBmuMPVOYv8njtY='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self'; child-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;

# Forwarded through the reverse proxy to the browser; harmless if the proxy
# terminates plain HTTP for LAN-only testing (browsers ignore HSTS on a
# non-HTTPS response). Drop `includeSubDomains` if other, non-HTTPS services
# share the parent domain on a different subdomain.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "same-origin" always;
# camera=(self): the invoice scanner uses getUserMedia (issue #25). Everything
# else the app never touches.
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
