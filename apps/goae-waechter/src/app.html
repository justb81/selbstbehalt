<!doctype html>
<!-- SPDX-License-Identifier: Apache-2.0 -->
<html lang="de-DE">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="GOÄ-Wächter: Arztrechnung fotografieren oder hochladen und die GOÄ/GOZ-Prüfung direkt im Browser laufen lassen – das Bild verlässt nie Ihr Gerät."
    />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <!-- PWA installability (docs/design.md §6.3). The manifest is generated by
         @vite-pwa/sveltekit at a stable filename; linking it here (rather than
         relying on plugin head-injection) keeps it in the static SPA fallback
         that adapter-static emits. Unlike apps/frontend, this demo has no
         reverse-proxy Basic Auth in front of it, so no `crossorigin` attribute
         is needed for the manifest fetch. -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
